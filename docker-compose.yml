services:

  mysql:
    image: mysql:8
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: Revath@07
      MYSQL_DATABASE: mini_banking
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  banking-app:
    build: .
    container_name: banking-container
    ports:
      - "8080:8080"
    depends_on:
      - mysql
volumes:
  mysql-data: